name: Chart Test and Release

on:
  push:
    branches:
      - master
      - "release/*"
    paths:
      - "chart/**"
      - ".github/workflows/chart-test-release.yaml"
  pull_request:
    branches: [master]
    paths:
      - "chart/**"
      - ".github/workflows/chart-test-release.yaml"

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run helm unittest
        uses: d3adb5/helm-unittest-action@v2.5.0
        with:
          charts: chart

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Add dependency repos
        run: helm repo add valkey https://valkey.io/valkey-helm/

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Lint chart
        run: ct lint --target-branch master --charts chart

  test-in-minikube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: start minikube
        id: minikube
        uses: medyagh/setup-minikube@v0.0.21

      - name: Try the cluster!
        run: |
          kubectl get pods -A
          helm --version

  release:
    needs: [unittest, lint, test-in-minikube]
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard against stable release from release branch
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          version=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
          if [[ "$version" != *-* ]]; then
            echo "::error::Stable version '$version' not allowed on a release branch. Use a pre-release version (e.g. 1.0.0-rc.1)."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Add dependency repos
        run: helm repo add valkey https://valkey.io/valkey-helm/

      - name: Build dependencies and prep release
        run: |
          helm dependency build chart
          cp README.md LICENSE chart/

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: "."
          mark_as_latest: ${{ github.ref == 'refs/heads/master' }}
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
