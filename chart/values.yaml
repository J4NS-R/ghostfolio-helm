# Default values for ghostfolio.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghostfolio/ghostfolio
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# Init container image used to wait for dependencies (Postgres, Valkey) before starting Ghostfolio.
initImage:
  repository: busybox
  tag: "1.37"
  pullPolicy: IfNotPresent

# This defines the Ghostfolio configuration
ghostfolio:
  # Name of an existing Secret containing ACCESS_TOKEN_SALT and JWT_SECRET_KEY.
  existingSecret: ""
  # Keys within the existing Secret for each sensitive value.
  existingSecretKeys:
    ACCESS_TOKEN_SALT: "ACCESS_TOKEN_SALT"
    JWT_SECRET_KEY: "JWT_SECRET_KEY"
  BASE_CURRENCY: EUR
  PORT: 3333
  # Recommended to change this value to the actual external URL for ghostfolio
  ROOT_URL: "http://0.0.0.0:3333"

# This defines the PostgreSQL server configuration that will be deployed using Helm subchart.
# For more information checkout: https://github.com/CloudPirates-io/helm-charts/tree/main/charts/postgres
# To use an external PostgreSQL server, set postgres.enabled=false and add an item under `env` with
# name=DATABASE_URL and either a `value` or `valueFrom` expression pointing to your connection string.
# IMPORTANT: When postgres.enabled=true, the Secret referenced by auth.existingSecret (or the auto-generated
# one) MUST contain a key named 'uri' with the full PostgreSQL connection string
# (e.g. postgresql://user:pass@host:5432/db).
postgres:
  enabled: true
  auth:
    username: ghostfolio-user
    database: ghostfolio-db
    existingSecret: ""
    secretKeys:
      adminPasswordKey: "postgres-password"

# This defines the Valkey server configuration that will be deployed using Helm subchart.
# Set the .enabled key to false to use an external Valkey/Redis server.
# For more information checkout: https://github.com/valkey-io/valkey-helm
valkey:
  enabled: true
  auth:
    enabled: true
    # Name of an existing Secret containing the Valkey password.
    # The Secret must contain a key matching the default user (see passwordSecretKey).
    usersExistingSecret: ""
    aclUsers:
      default:
        # Full read-write permissions by default
        permissions: "~* &* +@all"
  # Key within the existing Secret that holds the password for Ghostfolio to connect.
  # This is used to inject REDIS_PASSWORD into the Ghostfolio deployment.
  passwordSecretKey: "default"
  service:
    port: 6379
externalValkey:
  host: "redis"
  port: 6379
  # Name of an existing Secret containing the Valkey/Redis password.
  existingSecret: ""
  # Key within the existing Secret that holds the password.
  existingSecretPasswordKey: "password"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  # fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  type: ClusterIP
  port: 80

# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
resources: {}
  # limits:
  #   cpu: 300m
  #   memory: 768Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6
readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
startupProbe:
  httpGet:
    path: /api/v1/health
    port: http
  failureThreshold: 30
  periodSeconds: 10

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional environment variables
env:
# - name: myenv
#   value: foo

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
