suite: test deployment
templates:
  - deployment.yaml
  # deployment depends on these
  - configmap.yaml
values:
  - test.values.yaml
chart:
  appVersion: 1.2.3
tests:
  - it: uses the right image and tag
    template: deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghostfolio/ghostfolio:1.2.3

  - it: injects DATABASE_URL from subchart secret when postgres enabled
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: pg-secret
                key: uri

  - it: does not inject DATABASE_URL when postgres disabled
    template: deployment.yaml
    set:
      postgres.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
          any: true

  - it: allows inline DATABASE_URL via env when postgres disabled
    template: deployment.yaml
    set:
      postgres.enabled: false
      env:
        - name: DATABASE_URL
          value: "postgresql://user:pass@external-host:5432/mydb"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-postgres
                key: uri
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            value: "postgresql://user:pass@external-host:5432/mydb"

  - it: allows DATABASE_URL from external secret via env when postgres disabled
    template: deployment.yaml
    set:
      postgres.enabled: false
      env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: my-external-db-secret
              key: connection-string
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: my-external-db-secret
                key: connection-string

  - it: uses postgres fullnameOverride for secret name
    template: deployment.yaml
    set:
      postgres:
        fullnameOverride: custom-pg
        auth:
          existingSecret: ""
          password: "hunter2"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: custom-pg
                key: uri

  - it: uses built-in valkey secret name and default key
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: valkey-secret
                key: default

  - it: uses custom passwordSecretKey for built-in valkey
    template: deployment.yaml
    set:
      valkey.passwordSecretKey: my-custom-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: valkey-secret
                key: my-custom-key

  - it: uses external valkey secret name and default key
    template: deployment.yaml
    set:
      valkey.enabled: false
      externalValkey.existingSecret: my-external-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-external-secret
                key: password

  - it: uses custom key for external valkey
    template: deployment.yaml
    set:
      valkey.enabled: false
      externalValkey.existingSecret: my-external-secret
      externalValkey.existingSecretPasswordKey: redis-pass
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-external-secret
                key: redis-pass

  - it: has init container that waits for postgres and valkey
    template: deployment.yaml
    asserts:
      - exists:
          path: spec.template.spec.initContainers
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-dependencies

  - it: init container waits only for valkey when postgres disabled
    template: deployment.yaml
    set:
      postgres.enabled: false
    asserts:
      - exists:
          path: spec.template.spec.initContainers
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "RELEASE-NAME-valkey"
      - notMatchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "RELEASE-NAME-postgres"

  - it: has no init container when both postgres and valkey are disabled
    template: deployment.yaml
    set:
      postgres.enabled: false
      valkey.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.initContainers
