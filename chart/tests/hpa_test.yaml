suite: test hpa
templates:
  - hpa.yaml
values:
  - test.values.yaml
chart:
  appVersion: 1.2.3
tests:
  - it: does not render HPA when autoscaling disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders HPA when autoscaling enabled
    set:
      autoscaling.enabled: true
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler

  - it: uses minReplicas and maxReplicas from values
    set:
      autoscaling.enabled: true
      autoscaling.minReplicas: 2
      autoscaling.maxReplicas: 10
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: includes CPU metric when targetCPUUtilizationPercentage set
    set:
      autoscaling.enabled: true
      autoscaling.targetCPUUtilizationPercentage: 60
    asserts:
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 60

  - it: includes memory metric when targetMemoryUtilizationPercentage set
    set:
      autoscaling.enabled: true
      autoscaling.targetCPUUtilizationPercentage: 0
      autoscaling.targetMemoryUtilizationPercentage: 70
    asserts:
      - equal:
          path: spec.metrics[0].resource.name
          value: memory
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 70
