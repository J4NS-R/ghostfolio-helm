apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ghostfolio.fullname" . }}
  labels:
    {{- include "ghostfolio.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ghostfolio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ghostfolio.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ghostfolio.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.postgres.enabled .Values.valkey.enabled }}
      initContainers:
        - name: wait-for-dependencies
          image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
          imagePullPolicy: {{ .Values.initImage.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              {{- if .Values.postgres.enabled }}
              echo "Waiting for PostgreSQL at {{ include "ghostfolio.postgresFullname" . }}:5432..."
              until nc -z -w 3 {{ include "ghostfolio.postgresFullname" . }} 5432; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready."
              {{- end }}
              {{- if .Values.valkey.enabled }}
              echo "Waiting for Valkey at {{ include "ghostfolio.valkeyHost" . }}:{{ .Values.valkey.service.port }}..."
              until nc -z -w 3 {{ include "ghostfolio.valkeyHost" . }} {{ .Values.valkey.service.port }}; do
                echo "Valkey not ready, retrying in 2s..."
                sleep 2
              done
              echo "Valkey is ready."
              {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "ghostfolio.fullname" . }}
          env:
            {{- if .Values.postgres.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ghostfolio.postgresSecretName" . }}
                  key: uri
            {{- end }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ghostfolio.valkeyPasswordSecretName" . }}
                  key: {{ include "ghostfolio.valkeyPasswordSecretKey" . }}
            - name: ACCESS_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ghostfolio.existingSecret }}
                  key: {{ .Values.ghostfolio.existingSecretKeys.ACCESS_TOKEN_SALT }}
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ghostfolio.existingSecret }}
                  key: {{ .Values.ghostfolio.existingSecretKeys.JWT_SECRET_KEY }}
          {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ghostfolio.PORT }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
